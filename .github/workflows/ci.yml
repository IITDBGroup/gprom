name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  ################################################################################
  # test whether a docker file was changed
  ################################################################################
  dockerfile-changes:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'Docker/**'

  src-changes:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'include/**'
              - 'Makefile.maintainer'
              - 'Makefile.am'
              - 'configure.ac'
              - 'blackboxtests/testdb/**'
  ################################################################################
  # if docker files where changed rebuild and deploy base development env image
  ################################################################################
  build-docker-base-image:
    needs: dockerfile-changes
    if: ${{ needs.dockerfile-changes.outputs.src_changed == 'true' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          file: "./Docker/buildenvironment/Dockerfile"
          push: true
          tags: iitdbgroup/gprom-build-env:latest
          platforms: |
                     linux/amd64
                     linux/arm64
  ################################################################################
  # build gprom and setup databases
  ################################################################################
  build:
    needs: [ src-changes, build-docker-base-image ]
    # only build build-env docker image from master and if docker files where as this does not depend on gprom code
    if: ${{ always() && (needs.build-docker-base-image.result == 'success' || needs.build-docker-base-image.result == 'skipped' )}}
    runs-on: ubuntu-latest
    # run in development container with all client libraries and DBs preinstalled
    container:
      image: iitdbgroup/gprom-build-env:latest
    steps:
    - uses: actions/checkout@v6

    - name: Configure
      run: |
           ./autogen.sh &&  ./configure \
           --prefix=/gprom/install \
           --enable-monetdb --with-mapi-lib=/monetdb/install/lib64/ --with-mapi-headers=/monetdb/install/include/monetdb/ \
           --enable-postgres --with-libpq-headers=/usr/include/postgresql \
           --enable-oracle --with-oci-headers=/usr/include/oracle/23/client64/ --with-oci-lib=/usr/lib/oracle/23/client64/lib/ \
           --enable-sqlite \
           --enable-duckdb
    - name: Build
      run: |
           make -j
           make -j install
           cp -r /gprom/install/bin gprombin

    - name: Setup test databases
      working-directory: blackboxtests
      run: |
           mkdir dbs
           duckdb -f testdb/testDB.sql dbs/duckdb.db
           sqlite3 dbs/sqlite.db < testdb/testDB.sql

    - name: Run regular tests
      run: make -j check

    - name: Upload gprom build
      uses: actions/upload-artifact@v4
      with:
        name: gprom-build
        path: gprombin/
        retention-days: 5

    - name: Upload databases
      uses: actions/upload-artifact@v4
      with:
        name: test-dbs
        path: blackboxtests/dbs
        retention-days: 5
  ################################################################################
  # build gprom and run blackbox tests on different databases
  ################################################################################
  backboxtests:
    needs: build
    # only build build-env docker image from master and if docker files where as this does not depend on gprom code
    if: ${{ always() && (needs.build.result == 'success' || needs.build.result == 'skipped' )}}
    runs-on: ubuntu-latest
    # run in development container with all client libraries and DBs preinstalled
    container:
      image: iitdbgroup/gprom-build-env:latest
    # run tests on different databases
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: sqlite
          - database: duckdb
          - database: postgres
    steps:
    - uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: gprom-build # Specify the name of the artifact to download
        path: ./blackboxtests/build

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: test-dbs # Specify the name of the artifact to download
        path: ./blackboxtests/dbs

    - name: Activate venv
      working-directory: blackboxtests
      run: |
           python3.12 -m venv venv
           echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
           echo "$PWD/venv/bin" >> $GITHUB_PATH
           chmod 777 ./build/gprom

    - name: Create test results directory
      working-directory: blackboxtests
      run: |
           mkdir -p testresults

    - name: Tests on duckdb
      working-directory: blackboxtests
      if: matrix.database == 'duckdb'
      run: |
           . venv/bin/activate
           venv/bin/pip install --upgrade pip
           venv/bin/pip install -r requirements.txt
           venv/bin/python ./gprom_blackbox_tests.py --gprom ./build/gprom -b duckdb -d dbs/duckdb.db -s default.optnopullnoselmove,default.noopt -t reg,prov,prov_use_tid,prov_composable,prov_composable_use_tid,semiring,reenact,query_prov,dl.reg,dl.lineage -f junitxml -o testresults/duckdb.xml

    - name: Tests on sqlite
      working-directory: blackboxtests
      if: matrix.database == 'sqlite'
      run: |
           . venv/bin/activate
           venv/bin/pip install -r requirements.txt
           venv/bin/python ./gprom_blackbox_tests.py --gprom ./build/gprom -b sqlite -d dbs/sqlite.db -s default.optnopullnoselmove,default.noopt -t reg.agg,reg.proj,reg.ordby,reg.set,reg.duprem -f junitxml -o testresults/sqlite.xml

    - name: Tests on postgres
      working-directory: blackboxtests
      if: matrix.database == 'postgres'
      run: |
           rm -rf dbs/postgres
           mkdir -p dbs/postgres
           chown -R postgres dbs/postgres/
           mkdir -p /var/run/postgresql/
           chown -R postgres /var/run/postgresql/
           sudo -u postgres initdb --auth=trust --auth-host=trust -D dbs/postgres/
           sudo -u postgres pg_ctl -D dbs/postgres/ start
           sleep 3
           psql -U postgres -f testdb/testDB.sql postgres
           . venv/bin/activate
           venv/bin/pip install -r requirements.txt
           venv/bin/python ./gprom_blackbox_tests.py --gprom ./build/gprom -b postgres -H 127.0.0.1 -u postgres -p 5432 -d postgres -s default.optnopullnoselmove,default.noopt -t reg,prov,prov_composable,prov_use_tid,prov_composable_use_tid,semiring,reenact,query_prov,dl.reg,dl.lineage  -f junitxml -o testresults/postgres.xml
           sudo -u postgres /usr/bin/pg_ctl -D dbs/postgres/ stop

    - name: Create test summary
      if: always()
      uses: pmeier/pytest-results-action@main
      with:
        path: blackboxtests/testresults/${{ matrix.database }}.xml

        # (Optional) Add a summary of the results at the top of the report
        summary: true

        # (Optional) Fail the workflow if no JUnit XML was found.
        fail-on-empty: true

        # (Optional) Title of the test results section in the workflow summary
        title: Test results ${{ matrix.database }}


  ################################################################################
  # if tests where successful rebuild and deploy docker image
  ################################################################################
  build-gprom-docker-images:
    runs-on: ubuntu-latest
    needs: backboxtests
    if: ${{ always() && github.ref == 'refs/heads/master' && (needs.build.result == 'success' || needs.build.result == 'skipped' ) }} # only build docker image from master
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          file: "./Docker/Dockerfile"
          push: true
          tags: iitdbgroup/gprom:latest
          platforms: |
                     linux/amd64
                     linux/arm64
